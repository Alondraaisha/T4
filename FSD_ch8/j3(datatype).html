<html>
    <head>
        <script language="javascript" , type="text/javascript">
            console.log("------Primitive data type------")
            var a=20
            var b=30.5
            var c="hello"
            var d=true
            var e
            var f=null
            console.log("data type of a :"+typeof(a))
            console.log("data type of b :"+typeof(b))
            console.log("data type of c :"+typeof(c))
            console.log("data type of d :"+typeof(d))
            console.log("data type of e :"+typeof(e))
            console.log("data type of f :"+typeof(f))
            console.log("")

            //----------------------------------------------------------------------------------

            console.log("------ NON Primitive data type------")

            console.log("Objcet Example")
            var emp={id:101,name:"aisha", salary:50000};
            document.write(emp.id+" "+emp.name+" "+emp.salary)
            console.log(emp.id+" "+emp.name+" "+emp.salary)
            console.log("")

            console.log("Array Example")
            const num=[10,20,30,40,50,60]
            let len=num.length
            console.log("num[1] = "+num[1])
            console.log("length = "+len)
            console.log("num[len-1] = "+num[len-1])
            console.log("Array is :"+num)
            console.log(typeof(num))
        </script>
    </head>
</html>
