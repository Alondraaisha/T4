<!--
1.onkeypress (printable output)
2.onkeydown (all )
3.onkeyup

keycode = ascii value of any key
-->
<html>
    <head>
        <script language="javascript" , type="text/javascript">

            function ok1(e){
                e.bgColor="#4f6bb3"

            }
            function ok2(e){
                e.bgColor="#864fb3"
            }
           
        </script>
    </head>
    <body onkeydown="ok1(this)" onkeyup="ok2(this)">
        
    </body>
</html>
