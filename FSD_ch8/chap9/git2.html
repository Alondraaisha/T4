<!DOCTYPE html>
<html>
<head>
    <title>Mouse Events</title>
    <script type="text/javascript">
        function changeColor(color) {
            document.body.style.backgroundColor = color;
        }

        function showTime() {
            var currentDateTime = new Date();
            alert("Current Date and Time: " + currentDateTime);
        }

        function turnYellow() {
            document.getElementById('heading').style.color = 'yellow';
        }

        function turnBlack() {
            document.getElementById('heading').style.color = 'black';
        }
    </script>
</head>
<body>
    <h1 id="heading" onmouseover="turnYellow()" onmouseout="turnBlack()">Hover over this heading</h1>
    
    <button onclick="showTime()">Find Time</button>
    <button onclick="changeColor('red')">Red</button>
    <button onclick="changeColor('green')">Green</button>
</body>
</html>
