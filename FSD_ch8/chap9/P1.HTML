<!--
1.onkeypress (printable output)
2.onkeydown (all )
3.onkeyup

keycode = ascii value of any key
-->
<html>
    <head>
        <script language="javascript" , type="text/javascript">
            function vowel(e) {
                var k = e.key;
                if (k == "a" || k == "e" || k == "i" || k == "o" || k == "u" || 
                    k == "A" || k == "E" || k == "I" || k == "O" || k == "U") {
                    alert("This is a vowel");
                } else {
                    alert("This is not a vowel");
                }
            }
        </script>
    </head>
    <body onkeypress="vowel(event)">
        
    </body>
</html>
