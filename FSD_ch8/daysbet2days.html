<html>
    <head>
        <title>My First Webpage</title>
        <script>
            console.log("days between 2 date")
            function days(date1,date2){
            const od = 1000 * 60 * 60 * 24; // hours
            const d1=date1.getTime()
            const d2=date2.getTime()
            const diff = Math.abs(d1 - d2);
            return Math.ceil(diff / od);
        }
        function display()
        {
            const date = prompt("enter date (dd-mm-yyyy)")
            const date_parts=date.split("-")
            const d=date_parts[0]
            const m=date_parts[1]-1
            const y=date_parts[2]
            const nd=new Date()
            nd.setDate(d)
            nd.setMonth(m)
            nd.setFullYear(y)
            console.log(nd)
            const cd=new Date()
            document.write(days(cd,nd))

        }
        </script>
        <style>
            button{
                background-color: rgb(225, 85, 227);
                height: 50px;
                width:100px;
                border-color: rgb(14, 14, 35);
                border-style: dashed;
            }
        </style>
    </head>
    <body>
        <button onclick="display()">Calculate Days</button>
        <h1 id="i1"></h1>
    </body>
</html>
